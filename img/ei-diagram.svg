<circle cx="464" cy="342" r="64" fill="none" stroke="#E87422" stroke-width="0.6" opacity="0.18"/>
<circle cx="464" cy="342" r="54" fill="none" stroke="#E87422" stroke-width="0.6" opacity="0.28"/>
