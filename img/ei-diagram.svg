<svg xmlns="http://www.w3.org/2000/svg" width="680" height="570" viewBox="0 0 680 570" role="img">
<title>Dhaqira backend architecture</title>
<desc>User voice query flows through editorial curation and RAG retrieval into the Arabic LLM EI core, producing voice synthesis output across App, Podcast and Class surfaces.</desc>
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text{font-family:'Plus Jakarta Sans','Segoe UI',sans-serif;}
    .th{font-size:12px;font-weight:600;}
    .ts{font-size:10px;font-weight:400;}
    .f1{stroke-dasharray:6 4;animation:fl 1.8s linear infinite;}
    .f2{stroke-dasharray:6 4;animation:fl 2.5s linear infinite;}
    .f3{stroke-dasharray:6 4;animation:fl 2.1s linear infinite;}
    @keyframes fl{to{stroke-dashoffset:-20;}}
  </style>
</defs>

<rect width="680" height="570" rx="16" fill="#0d1829"/>
<g stroke="#1a2a44" stroke-width="0.5">
  <line x1="170" y1="0"   x2="170" y2="570"/>
  <line x1="398" y1="0"   x2="398" y2="440"/>
  <line x1="530" y1="0"   x2="530" y2="570"/>
  <line x1="0"   y1="190" x2="680" y2="190"/>
  <line x1="0"   y1="390" x2="680" y2="390"/>
</g>

<text class="ts" x="85"  y="24" text-anchor="middle" fill="#3a5070" letter-spacing="1">INPUT</text>
<text class="ts" x="284" y="24" text-anchor="middle" fill="#3a5070" letter-spacing="1">KNOWLEDGE</text>
<text class="ts" x="464" y="24" text-anchor="middle" fill="#3a5070" letter-spacing="1">EI ENGINE</text>
<text class="ts" x="602" y="24" text-anchor="middle" fill="#3a5070" letter-spacing="1">SURFACES</text>

<!-- USER INPUT -->
<circle cx="85" cy="108" r="42" fill="#14253d" stroke="#E87422" stroke-width="1.8"/>
<rect x="76" y="88" width="18" height="26" rx="9" fill="#E87422"/>
<path d="M66 112 Q66 130 85 130 Q104 130 104 112" fill="none" stroke="#E87422" stroke-width="2.2" stroke-linecap="round"/>
<line x1="85" y1="130" x2="85" y2="138" stroke="#E87422" stroke-width="2"/>
<line x1="77" y1="138" x2="93" y2="138" stroke="#E87422" stroke-width="1.8" stroke-linecap="round"/>
<text class="th" x="85" y="162" text-anchor="middle" fill="#E8DCC8">Voice / text</text>
<text class="ts" x="85" y="174" text-anchor="middle" fill="#8090a8">User query</text>

<!-- SCHOLAR ARCHIVE -->
<circle cx="284" cy="108" r="42" fill="#14253d" stroke="#E87422" stroke-width="1.8"/>
<rect x="262" y="90"  width="10" height="28" rx="2" fill="#E87422"/>
<rect x="276" y="86"  width="10" height="32" rx="2" fill="#BA7517"/>
<rect x="290" y="93"  width="9"  height="25" rx="2" fill="#E87422" opacity="0.8"/>
<rect x="302" y="88"  width="8"  height="30" rx="2" fill="#633806"/>
<text class="th" x="284" y="162" text-anchor="middle" fill="#E8DCC8">Intellectual archive</text>
<text class="ts" x="284" y="174" text-anchor="middle" fill="#BA7517">Books · interviews · articles</text>

<!-- EDITORIAL CURATION -->
<rect x="210" y="220" width="148" height="62" rx="10" fill="#14253d" stroke="#7F77DD" stroke-width="1.4"/>
<g transform="translate(216,232)">
  <rect x="0" y="5" width="12" height="4" rx="1" fill="#7F77DD" transform="rotate(-42 6 7)"/>
  <polygon points="0,17 3,13 4,17" fill="#7F77DD"/>
  <path d="M16 7 L19 11 L25 4" fill="none" stroke="#9FE1CB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<text class="th" x="294" y="244" text-anchor="middle" fill="#CECBF6">Editorial curation</text>
<text class="ts" x="294" y="259" text-anchor="middle" fill="#9090c0">Verified · indexed</text>

<!-- RAG RETRIEVER -->
<rect x="210" y="316" width="148" height="62" rx="10" fill="#14253d" stroke="#534AB7" stroke-width="1.4"/>
<g transform="translate(216,326)">
  <circle cx="10" cy="10" r="8.5" fill="none" stroke="#534AB7" stroke-width="2.2"/>
  <line x1="16.5" y1="16.5" x2="24" y2="24" stroke="#534AB7" stroke-width="2.8" stroke-linecap="round"/>
</g>
<text class="th" x="294" y="340" text-anchor="middle" fill="#AFA9EC">RAG retriever</text>
<text class="ts" x="294" y="355" text-anchor="middle" fill="#7070a8">Semantic search</text>

