      fill="none" stroke="#854F0B" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
<text class="th" x="464" y="400" text-anchor="middle" fill="#E8DCC8">Arabic LLM</text>
<text class="ts" x="464" y="413" text-anchor="middle" fill="#E87422">EI core</text>

<!-- VOICE SYNTHESIS -->
